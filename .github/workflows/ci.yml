name: Build and Publish Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting and lint
        run: pnpm run check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test --run

      - name: Build frontend
        run: pnpm --filter frontend run build

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [lint-and-test]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/omni-notify:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/omni-notify:latest
          cache-to: type=inline

      - name: Logout from GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: docker logout ghcr.io

  notify:
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-and-publish]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Send Pushover notification
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: |
          if [ "${{ needs.build-and-publish.result }}" = "success" ]; then
            TITLE="omni-notify deployed"
            MESSAGE="Container pushed successfully"
          else
            TITLE="omni-notify CI failed"
            FAILED=""
            [ "${{ needs.lint-and-test.result }}" != "success" ] && FAILED="lint-and-test"
            [ "${{ needs.build-and-publish.result }}" != "success" ] && FAILED="${FAILED:+$FAILED, }build-and-publish"
            MESSAGE="Failed jobs: ${FAILED}"
            PRIORITY=1
          fi
          curl -s -o /dev/null \
            --form-string "token=$PUSHOVER_TOKEN" \
            --form-string "user=$PUSHOVER_USER" \
            --form-string "title=$TITLE" \
            --form-string "message=$MESSAGE" \
            --form-string "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --form-string "url_title=View run" \
            ${PRIORITY:+--form-string "priority=$PRIORITY"} \
            https://api.pushover.net/1/messages.json
