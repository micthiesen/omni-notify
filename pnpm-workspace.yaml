packages:
  - frontend

allowBuilds:
  better-sqlite3: true
  # core-js@2 (via @postlight/parser) postinstall only prints a funding banner
  core-js: false
  esbuild: true

peerDependencyRules:
  ignoreMissing:
    - "@types/node"

# @postlight/parser pins difflib to a github fork of the identically-versioned
# npm package; git subdeps are blocked by supply-chain policy, so map it back.
overrides:
  "@postlight/parser>difflib": "npm:difflib@0.2.4"

patchedDependencies:
  jmap-rfc-types@0.1.3: patches/jmap-rfc-types@0.1.3.patch

minimumReleaseAgeExclude:
  - '@micthiesen/mitools@3.0.1 || 3.0.2 || 3.0.3'
  - '@biomejs/biome@2.5.4'
  - '@biomejs/cli-darwin-arm64@2.5.4'
  - '@biomejs/cli-darwin-x64@2.5.4'
  - '@biomejs/cli-linux-arm64-musl@2.5.4'
  - '@biomejs/cli-linux-arm64@2.5.4'
  - '@biomejs/cli-linux-x64-musl@2.5.4'
  - '@biomejs/cli-linux-x64@2.5.4'
  - '@biomejs/cli-win32-arm64@2.5.4'
  - '@biomejs/cli-win32-x64@2.5.4'
